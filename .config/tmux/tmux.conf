# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#                 Tmux Configuration                        ┃
#              Tmux 终端复用器配置                           ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#              Wayland Notification Support | Wayland 通知支持 ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Environment variables for D-Bus and Wayland notifications
# D-Bus 和 Wayland 通知的环境变量
set-environment -g DISPLAY ":0"
set-environment -g WAYLAND_DISPLAY "wayland-1"
set-environment -g DBUS_SESSION_BUS_ADDRESS "/run/user/1000/bus"
set-environment -g XDG_RUNTIME_DIR "/run/user/1000"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#              Basic Settings | 基础设置                    ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Enable mouse support | 启用鼠标支持
set -g mouse on

# Set terminal type | 设置终端类型
set -g default-terminal "tmux-256color"

# Scrollback history limit | 滚动历史限制
set -g history-limit 10000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#              Window & Pane Index | 窗口与面板索引        ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Start window index at 1 (more intuitive) | 窗口索引从 1 开始（更直观）
set -g base-index 1

# Start pane index at 1 | 面板索引从 1 开始
setw -g pane-base-index 1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#              Display Settings | 显示设置                  ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Message display time (milliseconds) | 消息显示时间（毫秒）
set -g display-time 2000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#           Catppuccin Theme Options | Catppuccin 主题选项  ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Note: These must be defined before plugins are loaded
# 注意：这些必须在插件加载前定义

# Select flavor: latte | frappe | macchiato | mocha
# 选择风味：latte | frappe | macchiato | mocha
set -g @catppuccin_flavor 'mocha'

# Window status style: basic | rounded | slanted | custom | none
# 窗口状态样式：basic | rounded | slanted | custom | none
set -g @catppuccin_window_status_style "rounded"

# Status bar background: default | none | hex color (e.g., '#1e1e2e')
# 状态栏背景：default | none | 十六进制颜色
set -g @catppuccin_status_background "default"

# Pane border colors (inactive/active) | 面板边框颜色（非活动/活动）
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#            Plugin List (Managed by TPM) | 插件列表        ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

set -g @plugin 'tmux-plugins/tpm'           # Tmux Plugin Manager | Tmux 插件管理器
set -g @plugin 'catppuccin/tmux#v2.3.0'     # Catppuccin theme | Catppuccin 主题
set -g @plugin 'tmux-plugins/tmux-cpu'      # CPU monitoring | CPU 监控
set -g @plugin 'tmux-plugins/tmux-battery'  # Battery monitoring | 电池监控

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#           Status Bar Configuration | 状态栏配置           ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Status bar left/right length | 状态栏左右长度
set -g status-left-length 100
set -g status-right-length 100

# Left side: session info (provided by theme) | 左侧：会话信息（由主题提供）
set -g status-left "#{E:@catppuccin_status_session}"

# Right side: app, CPU, RAM, session, uptime, battery
# 右侧：应用、CPU、内存、会话、运行时间、电池
# If tmux-cpu or tmux-battery is not installed, remove corresponding modules to avoid errors
# 如果未安装 tmux-cpu 或 tmux-battery，可删除对应模块避免报错
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#              TPM Initialization | TPM 初始化              ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# IMPORTANT: This must be at the end of the file
# 重要：这必须放在文件最后
run '~/.tmux/plugins/tpm/tpm'
