# ====================================
# 基础设置
# ====================================
set -g mouse on
set -g default-terminal "tmux-256color"
set -g history-limit 10000

# 窗口和面板索引从 1 开始（更符合直觉）
set -g base-index 1
setw -g pane-base-index 1

# 缩短消息显示时间
set -g display-time 2000

# ====================================
# Catppuccin 主题选项
# （必须在插件加载前定义）
# ====================================
# 选择风味：latte | frappe | macchiato | mocha
set -g @catppuccin_flavor 'mocha'

# 窗口标签样式：basic | rounded | slanted | custom | none
set -g @catppuccin_window_status_style "rounded"

# 状态栏背景：default | none | 十六进制颜色（如 '#1e1e2e'）
set -g @catppuccin_status_background "default"

# 面板边框颜色（非活动/活动）
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}"

# ====================================
# 插件列表（通过 TPM 管理）
# ====================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'       # 需要该插件才能显示 CPU
set -g @plugin 'tmux-plugins/tmux-battery'   # 需要该插件才能显示电池

# ====================================
# 状态栏配置
# ====================================
set -g status-left-length 100
set -g status-right-length 100

# 左侧：显示会话信息（主题提供的模块）
set -g status-left "#{E:@catppuccin_status_session}"

# 右侧：依次显示应用、CPU、内存、会话、运行时间、电池
# 若未安装 tmux-cpu 或 tmux-battery，可删除对应模块避免报错
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ====================================
# 初始化 TPM（必须放在文件最后）
# ====================================
run '~/.tmux/plugins/tpm/tpm'
