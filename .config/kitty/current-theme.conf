# Theme metadata | 主题元数据
## name: Tokyo Night
## license: MIT
## author: Folke Lemaitre
## upstream: https://github.com/folke/tokyonight.nvim/raw/main/extras/kitty/tokyonight_night.conf

# Main colors | 主颜色
background #1a1b26          # Background color | 背景颜色
foreground #c0caf5          # Foreground color | 前景颜色
selection_background #283457 # Selected text background | 选中文本背景
selection_foreground #c0caf5 # Selected text foreground | 选中文本前景
url_color #73daca           # URL link color | URL 链接颜色
cursor #c0caf5              # Cursor color | 光标颜色
cursor_text_color #16161e   # Cursor text color | 光标文字颜色

# Tab colors | 标签颜色
active_tab_background #7aa2f7      # Active tab background | 活动标签背景
active_tab_foreground #16161e      # Active tab foreground | 活动标签前景
inactive_tab_background #292e42    # Inactive tab background | 非活动标签背景
inactive_tab_foreground #545c7e    # Inactive tab foreground | 非活动标签前景
#tab_bar_background #15161e        # Tab bar background | 标签栏背景

# Window border colors | 窗口边框颜色
active_border_color #7aa2f7        # Active window border | 活动窗口边框
inactive_border_color #292e42      # Inactive window border | 非活动窗口边框

# Normal colors (0-7) | 正常颜色
color0 #15161e   # Black | 黑色
color1 #f7768e   # Red | 红色
color2 #9ece6a   # Green | 绿色
color3 #e0af68   # Yellow | 黄色
color4 #7aa2f7   # Blue | 蓝色
color5 #bb9af7   # Purple | 紫色
color6 #7dcfff   # Cyan | 青色
color7 #a9b1d6   # White | 白色

# Bright colors (8-15) | 亮色
color8  #414868   # Bright Black | 亮黑色
color9  #ff899d   # Bright Red | 亮红色
color10 #9fe044   # Bright Green | 亮绿色
color11 #faba4a   # Bright Yellow | 亮黄色
color12 #8db0ff   # Bright Blue | 亮蓝色
color13 #c7a9ff   # Bright Purple | 亮紫色
color14 #a4daff   # Bright Cyan | 亮青色
color15 #c0caf5   # Bright White | 亮白色

# Extended colors (16-17) | 扩展颜色
color16 #ff9e64   # Orange | 橙色
color17 #db4b4b   # Dark Red | 深红色
