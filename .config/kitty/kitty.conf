# Kitty configuration | Kitty 终端配置

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#              Wayland Notification Support | Wayland 通知支持 ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Environment variables for D-Bus and Wayland notifications
# D-Bus 和 Wayland 通知的环境变量
env = XDG_RUNTIME_DIR,/run/user/1000
env = DBUS_SESSION_BUS_ADDRESS,unix:path=/run/user/1000/bus

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#              Theme Settings | 主题设置                      ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Background opacity (0.0-1.0) | 背景透明度
background_opacity 0.85

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#              Tokyo Night Theme | Tokyo Night 主题           ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Include Tokyo Night theme colors | 引入 Tokyo Night 主题颜色
# BEGIN_KITTY_THEME | 主题开始
# Tokyo Night theme | Tokyo Night 主题
include current-theme.conf
# END_KITTY_THEME | 主题结束
