###################################
# Completion (自动完成) 快捷键
###################################
[[completion.prepend_keymap]]
on = ["<C-e>"]
run = "close"
desc = "关闭完成菜单"

[[completion.prepend_keymap]]
on = ["<C-y>"]
run = "accept"
desc = "接受选择"

[[completion.prepend_keymap]]
on = ["<Tab>"]
run = "arrow 1"
desc = "下一个"

[[completion.prepend_keymap]]
on = ["<S-Tab>"]
run = "arrow -1"
desc = "上一个"

###################################
# Help (帮助) 快捷键
###################################
[[help.prepend_keymap]]
on = ["<Esc>"]
run = "close"
desc = "关闭帮助"

[[help.prepend_keymap]]
on = ["q"]
run = "close"
desc = "关闭帮助"

###################################
# Spot (预览) 快捷键
###################################
[[spot.prepend_keymap]]
on = ["<Esc>"]
run = "close"
desc = "关闭 Spot"

###################################
# Pick (选择) 快捷键
###################################
[[pick.prepend_keymap]]
on = ["<Esc>"]
run = "close"
desc = "关闭选择"

[[pick.prepend_keymap]]
on = ["<CR>"]
run = "choose"
desc = "选择"

[[pick.prepend_keymap]]
on = ["<C-n>"]
run = "arrow 1"
desc = "下一个"

[[pick.prepend_keymap]]
on = ["<C-p>"]
run = "arrow -1"
desc = "上一个"
