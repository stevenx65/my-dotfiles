# =====================================================================
# =====================================================================

#  单文件版 Hyprland 完整配置文件 (适配 CachyOS)
# -----------------------------------------------------
# 1. 显示器设置
# -----------------------------------------------------
# 自动识别显示器，使用最佳分辨率和刷新率
monitor=,2560x1440@200.00Hz,auto,auto

# -----------------------------------------------------
# 2. 默认程序定义
# -----------------------------------------------------
$terminal = kitty
$menu = rofi -show drun -show-icons
$fileManager = kitty -e yazi # 终端文件管理器 yazi

# -----------------------------------------------------
# 3. 开机自启 (Autostart)
# -----------------------------------------------------
# 启动状态栏和通知守护进程
exec-once = waypaper --restore
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = mako
# 启动 KDE 提权弹窗组件（安装软件时输入密码用）
exec-once = /usr/lib/polkit-kde-authentication-agent-1
# 设置剪贴板历史
exec-once = fcitx5 -d
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

# -----------------------------------------------------
# 4. 环境变量 (Environment Variables)
# -----------------------------------------------------
env = XMODIFIERS, @im=fcitx
env = QT_IM_MODULE, fcitx
env = SDL_IM_MODULE, fcitx
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# 【注意】：如果你是 Nvidia 显卡，请取消下面几行的注释（删掉前面的#号）
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# -----------------------------------------------------
# 5. 外观与动画 (Look and Feel)
# -----------------------------------------------------
general { 
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }    
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
 }

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

#layerrule = blur, waybar
#layerrule = ignorezero, waybar

# 允许 waybar 窗口浮动，不要强制填充屏幕
#layerrule = waybar

# -----------------------------------------------------
# 6. 布局规则
# -----------------------------------------------------
dwindle {
    pseudotile = true
    preserve_split = true 
}

# -----------------------------------------------------
# 7. 键盘与鼠标输入 (Input)
# -----------------------------------------------------
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 # 鼠标灵敏度 
    touchpad {
        natural_scroll = true # 触摸板自然滚动
    }
}

# -----------------------------------------------------
# 8. 窗口规则 (Window Rules) - 修复了你之前的报错部分
# -----------------------------------------------------
# 让部分小工具默认悬浮显示
#windowrule = float,,mako-control
#windowrulev2 = suppressevent maximize, class:.* # 禁用最大化事件

# -----------------------------------------------------
# 9. 快捷键 (Keybindings) - 极其重要
# -----------------------------------------------------
$mainMod = SUPER # 将 Windows 键设为 Super 键

# 基础操作
bind = $mainMod, Q, exec, $terminal         # Win + Q：打开终端
bind = $mainMod, T, exec, $terminal -e /home/steven_xu/mako-control      # Win + T：打开 mako 控制面板
bind = $mainMod, C, killactive,             # Win + C：关闭当前窗口
bind = $mainMod, M, exit,                   # Win + M：退出 Hyprland (返回登录界面)
bind = $mainMod, E, exec, $fileManager      # Win + E：打开文件管理器
bind = $mainMod, V, togglefloating,         # Win + V：切换窗口悬浮/平铺
bind = $mainMod, R, exec, $menu             # Win + R：打开应用列表
bind = $mainMod, F, fullscreen,             # Win + F：全屏当前窗口

# 窗口焦点切换 (Win + 箭头)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# 切换工作区 (Win + 1~5)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# 把当前窗口移动到指定工作区 (Win + Shift + 1~5)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# 鼠标快捷操作 (极度好用)
bindm = $mainMod, mouse:272, movewindow    # 按住 Win + 鼠标左键 拖动窗口
bindm = $mainMod, mouse:273, resizewindow  # 按住 Win + 鼠标右键 改变窗口大小

# 音量与亮度快捷键 (适用于笔记本)
bindel = $mainMod, F12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainMod, F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

#OTHER
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/图片/screenshot_$(date +'%Y%m%d_%H%M%S').png
# Mako 没有控制中心界面，只能查看历史通知
# 查看历史通知: makoctl list
# 关闭所有通知: makoctl dismiss -a
bind = $mainMod, N, exec, makoctl dismiss -a
# 按 Win + M 唤起/打开 cmus 音乐播放器
# 如果 music 会话已存在则直接打开，否则新建并运行 cmus
bind = $mainMod SHIFT, M, exec, kitty --class cmus -e tmux new -A -s music cmus

