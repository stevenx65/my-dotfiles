# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
#                     Defaults Configuration                    ┃
# ┃                     默认变量配置                             ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# File manager application | 文件管理器
$filemanager =

# Application launcher | 应用启动器
$applauncher = wofi

# Terminal emulator | 终端模拟器
$terminal = alacritty

# Idle handler: lock screen after 5 minutes timeout | 空闲处理器：5 分钟后锁屏
$idlehandler = swayidle -w timeout 300 'swaylock -f -c 000000' before-sleep 'swaylock -f -c 000000'

# Screenshot tools | 截图工具
$shot-region = grimblast copy area          # Area selection screenshot | 区域截图
$shot-window = grimblast copy active        # Active window screenshot | 活动窗口截图
$shot-screen = grimblast copy output        # Full screen screenshot | 全屏截图
