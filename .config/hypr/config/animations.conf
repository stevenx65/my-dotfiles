#                     Animations Configuration                  ┃
# ┃                     动画配置                                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Animations wiki | 动画文档：https://wiki.hyprland.org/Configuring/Animations/

animations {
    # Enable animations | 启用动画
    enabled = yes

    # Custom bezier curve for overshoot effect | 自定义过冲效果贝塞尔曲线
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    # Window open animation | 窗口打开动画
    animation = windowsIn, 1, 4, overshot, slide

    # Window close animation | 窗口关闭动画
    animation = windowsOut, 1, 5, default, popin 80%

    # Border animation | 边框动画
    animation = border, 1, 5, default

    # Workspace transition animations | 工作区切换动画
    animation = workspacesIn, 1, 6, overshot, slide
    animation = workspacesOut, 1, 6, overshot, slidefade 80%
}
