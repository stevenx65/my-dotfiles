# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
#                     Variables Configuration                    ┃
# ┃                     变量配置                                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Source color variables | 引入颜色变量
source = ~/.config/hypr/config/colors.conf

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # Gap between windows | 窗口间距（内）
    gaps_in = 3

    # Gap outside windows | 窗口间距（外）
    gaps_out = 5

    # Border size | 边框大小
    border_size = 3

    # Active window border color | 活动窗口边框颜色
    col.active_border = $cachylgreen

    # Inactive window border color | 非活动窗口边框颜色
    col.inactive_border = $cachymblue

    # Layout mode: master (tiling) or dwindle (dwindling) | 布局模式：主窗口或分窗
    layout = dwindle

    # Snap feature settings | 吸附功能设置
    # https://wiki.hyprland.org/Configuring/Variables/#snap
    snap {
        enabled = true         # Enable snap | 启用吸附
    }
}

# Note: Removed old gestures {} block — Hyprland 0.39+ uses gesture = … lines
# 注意：已移除旧的 gestures {} 块 — Hyprland 0.39+ 使用 gesture = … 行

# Group settings for grouped windows | 分组窗口设置
# https://wiki.hyprland.org/Configuring/Variables/#group
group {
    col.border_active = $cachydgreen       # Active group border | 活动组边框
    col.border_inactive = $cachylgreen     # Inactive group border | 非活动组边框
    col.border_locked_active = $cachymgreen # Locked active group | 锁定活动组
    col.border_locked_inactive = $cachydblue # Locked inactive group | 锁定非活动组

    # Groupbar settings | 组栏设置
    # https://wiki.hyprland.org/Configuring/Variables/#groupbar
    groupbar {
        font_family = "Fira Sans"          # Font for groupbar | 组栏字体
        text_color = $cachydblue           # Text color | 文字颜色
        col.active = $cachydgreen          # Active tab color | 活动标签颜色
        col.inactive = $cachylgreen        # Inactive tab color | 非活动标签颜色
        col.locked_active = $cachymgreen   # Locked active tab | 锁定活动标签
        col.locked_inactive = $cachydblue  # Locked inactive tab | 锁定非活动标签
    }
}

# Miscellaneous settings | 杂项设置
# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    font_family = "Fira Sans"              # Default font | 默认字体
    splash_font_family = "Fira Sans"       # Splash screen font | 启动屏字体
    disable_hyprland_logo = true           # Hide Hyprland logo | 隐藏 Hyprland 标志
    col.splash = $cachylgreen              # Splash color | 启动屏颜色
    background_color = $cachydblue         # Background color | 背景颜色
    enable_swallow = true                  # Enable terminal swallow | 启用终端吞并
    swallow_regex = ^(nautilus|nemo|thunar|btrfs-assistant.)$  # Apps to swallow | 要吞并的应用
    focus_on_activate = true               # Focus on activate | 激活时聚焦
    vrr = 2                                # VRR mode: 0=off, 1=on, 2=adaptive | VRR 模式
    # See https://wiki.hyprland.org/Configuring/Variables/#misc for more details
}

# Render settings | 渲染设置
# https://wiki.hyprland.org/Configuring/Variables/#render
render {
    direct_scanout = true                  # Direct scanout for better performance | 直接扫描输出以获得更好性能
}

# Dwindle layout settings | 分窗布局设置
# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    special_scale_factor = 0.8             # Special window scale | 特殊窗口缩放
    pseudotile = true                      # Enable pseudotiling | 启用伪平铺
    preserve_split = true                  # Preserve window split | 保留窗口分割
}

# Master layout settings | 主窗口布局设置
# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master                    # New windows status | 新窗口状态
    special_scale_factor = 0.8             # Special window scale | 特殊窗口缩放
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#                      Gestures                                 ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Gesture wiki | 手势文档

# 4-finger horizontal swipe to switch workspaces | 四指水平滑动切换工作区
gesture = 4, horizontal, workspace

# 3-finger swipe down closes active window | 三指向下滑动关闭活动窗口
gesture = 3, down, close

# 3-finger swipe up toggles fullscreen | 三指向上滑动切换全屏
gesture = 3, up, fullscreen

# 3-finger swipe left toggles float/tile | 三指向左滑动切换浮动/平铺
gesture = 3, left, float
