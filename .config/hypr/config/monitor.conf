# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
#                     Monitor Configuration                     ┃
# ┃                     显示器配置                               ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Monitor wiki | 显示器文档：https://wiki.hyprland.org/Configuring/Monitors/

# Use preferred resolution and refresh rate on primary display | 使用首选分辨率和刷新率
monitor = , preferred, auto, 1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#        Optional: XWayland and Scaling Configuration           ┃
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Force XWayland to use zero scaling (for apps that don't support HiDPI)
# 强制 XWayland 使用零缩放（适用于不支持 HiDPI 的应用）
# xwayland {
#   force_zero_scaling = true
# }

# GDK scaling factor for GTK applications (no fractional scaling)
# GTK 应用 GDK 缩放因子（无分数缩放）
# env = GDK_SCALE, 2

# Electron apps use X11 by default, set to auto for Wayland detection
# Electron 应用默认使用 X11，设置为 auto 以检测 Wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto
