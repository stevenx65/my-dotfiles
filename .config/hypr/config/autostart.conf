# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Autostart Configuration                  ┃
# ┃                      开机自启配置                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Source defaults for variables | 引入默认变量
source = ~/.config/hypr/config/defaults.conf

# Autostart wiki | 自动启动文档: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Set wallpaper | 设置壁纸
exec-once = swaybg -o \* -i /usr/share/wallpapers/cachyos-wallpapers/Skyscraper.png -m fill

# Start Waybar status bar | 启动状态栏
exec-once = waybar &

# Start Fcitx5 input method | 启动输入法
exec-once = fcitx5 -d &

# Start Mako notification daemon | 启动通知守护进程
exec-once = mako &

# Start NetworkManager applet | 启动网络管理器
exec-once = nm-applet --indicator &

# Setup WOB (Wireless Output Bar) for volume/brightness feedback | 设置音量/亮度反馈条
exec-once = bash -c "mkfifo /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob && tail -f /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob | wob & disown" &

# KDE authentication agent for polkit | KDE 权限认证代理
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &

# Import systemd environment variables | 导入 systemd 环境变量
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd &

# Idle handler (from defaults.conf) | 空闲处理器（来自 defaults.conf）
exec-once = $idlehandler
