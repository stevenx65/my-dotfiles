# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
#                    Decorations Configuration                  ┃
# ┃                     窗口装饰配置                             ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Source color variables | 引入颜色变量
source = ~/.config/hypr/config/colors.conf

# https://wiki.hyprland.org/Configuring/Variables/#decoration

decoration {
    # Active window opacity | 活动窗口透明度 (1.0 = 100%)
    active_opacity = 1

    # Window corner rounding | 窗口圆角半径
    rounding = 4

    # Blur effect settings | 模糊效果设置
    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        size = 15              # Blur kernel size | 模糊核大小
        passes = 2             # More passes = more resource intensive | 更多通过 = 更多资源消耗
        xray = true            # Show content behind blurred areas | 显示模糊区域后的内容
    }

    # Shadow settings | 阴影设置
    # https://wiki.hyprland.org/Configuring/Variables/#shadow
    shadow {
        enabled = false        # Disable shadow | 禁用阴影
    }
}
